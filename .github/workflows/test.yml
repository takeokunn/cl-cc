name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SBCL
        run: brew install sbcl

      - name: Run tests
        run: sbcl --dynamic-space-size 4096 --non-interactive --eval '(require :asdf)' --load cl-cc.asd --eval '(asdf:load-system :cl-cc/test)' --eval '(asdf:test-system :cl-cc/test)'
